<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0f1117;color:#e0e0e0;min-height:100vh;
}
.header{text-align:center;padding:36px 20px 16px;}
.header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#66bb6a,#43a047,#2e7d32);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{color:#666;margin-top:6px;font-size:13px;}
.header a{color:#555;font-size:12px;text-decoration:none;margin-left:8px;}
.header a:hover{color:#ffa726;}
.container{max-width:800px;margin:0 auto;padding:0 20px 60px;}

/* 登录 */
.login-box{max-width:360px;margin:40px auto;padding:24px;border-radius:12px;background:#1a1d28;border:1px solid #2a2d38;}
.login-box label{display:block;font-size:13px;color:#888;margin-bottom:8px;}
.login-box input{width:100%;padding:12px;border-radius:8px;border:1px solid #2a2d38;background:#0f1117;color:#e0e0e0;font-size:14px;outline:none;margin-bottom:12px;}
.login-box input:focus{border-color:#66bb6a;}
.login-box .msg{font-size:13px;color:#ff6b6b;margin-bottom:12px;display:none;}
.login-box button{width:100%;padding:12px;border-radius:8px;border:none;background:#43a047;color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
.login-box button:hover{background:#388e3c;}

/* 编辑器 */
.editor-box{display:none;}
.editor-box.show{display:block;}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar label{font-size:13px;color:#888;white-space:nowrap;}
.toolbar select{padding:10px 14px;border-radius:8px;border:1px solid #2a2d38;background:#1a1d28;color:#e0e0e0;font-size:14px;outline:none;min-width:200px;}
.toolbar select:focus{border-color:#66bb6a;}
.toolbar .spacer{flex:1;}
.toolbar button{padding:8px 18px;border-radius:8px;border:1px solid #2a2d38;background:transparent;color:#888;font-size:13px;cursor:pointer;transition:all .2s;}
.toolbar button:hover{border-color:#ff6b6b;color:#ff6b6b;}
.toolbar button.primary{background:#43a047;border-color:#43a047;color:#fff;font-size:14px;font-weight:600;}
.toolbar button.primary:hover{background:#388e3c;border-color:#388e3c;color:#fff;}
.toolbar button.primary:disabled{opacity:.4;cursor:not-allowed;}

/* 编辑区 */
textarea.editor-area{width:100%;min-height:500px;padding:16px;border-radius:12px;border:1px solid #2a2d38;background:#1a1d28;color:#e0e0e0;font-size:14px;line-height:1.8;resize:vertical;outline:none;font-family:inherit;tab-size:2;}
textarea.editor-area:focus{border-color:#66bb6a;}

/* 提示 */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;transition:opacity .3s;}
.toast.success{background:#1a2e1a;color:#4caf50;border:1px solid #2e7d32;}
.toast.error{background:#2e1a1a;color:#ff6b6b;border:1px solid #c62828;}

@media(max-width:500px){.toolbar{flex-direction:column;align-items:stretch;}
  .toolbar select{width:100%;}}
</style>
</head>
<body>

<div class="header">
  <h1>知识库编辑器</h1>
  <p>编辑产品知识库内容，保存后立即生效，无需重启服务</p>
  <a href="/">返回标题助手</a>
</div>

<div class="container">

  <!-- 登录框 -->
  <div class="login-box" id="loginBox">
    <label>请输入编辑器密码</label>
    <input type="password" id="passwordInput" placeholder="密码在 .env 的 EDITOR_PASSWORD 中配置" autofocus>
    <div class="msg" id="loginMsg"></div>
    <button id="loginBtn" onclick="doLogin()">进入编辑器</button>
  </div>

  <!-- 编辑器 -->
  <div class="editor-box" id="editorBox">
    <div class="toolbar">
      <label>产品：</label>
      <select id="productSelect">
        <option value="">-- 加载中 --</option>
      </select>
      <span class="spacer"></span>
      <button id="saveBtn" class="primary" onclick="doSave()">保存</button>
      <button onclick="doLogout()">退出</button>
    </div>
    <textarea class="editor-area" id="contentArea" placeholder="选择产品后加载知识库内容..."></textarea>
  </div>

</div>

<script>
let currentProduct = "";

// ====== 回车登录 ======
document.getElementById("passwordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

// ====== 产品切换自动加载 ======
document.getElementById("productSelect").addEventListener("change", () => {
  currentProduct = document.getElementById("productSelect").value;
  if (currentProduct) loadContent(currentProduct);
});

// ====== Ctrl+S 保存 ======
document.getElementById("contentArea").addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "s") {
    e.preventDefault();
    doSave();
  }
});

// ====== 登录 ======
async function doLogin() {
  const pwd = document.getElementById("passwordInput").value;
  if (!pwd) return;
  const btn = document.getElementById("loginBtn");
  const msg = document.getElementById("loginMsg");
  btn.disabled = true; btn.textContent = "验证中...";
  msg.style.display = "none";

  try {
    const resp = await fetch("/editor/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({password: pwd}),
    });
    const data = await resp.json();
    if (data.success) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("editorBox").classList.add("show");
      loadProducts();
    } else {
      msg.textContent = data.error || "密码错误";
      msg.style.display = "block";
    }
  } catch (err) {
    msg.textContent = "请求失败：" + err.message;
    msg.style.display = "block";
  } finally {
    btn.disabled = false; btn.textContent = "进入编辑器";
  }
}

// ====== 加载产品列表 ======
async function loadProducts() {
  try {
    const resp = await fetch("/editor/api/products");
    const data = await resp.json();
    if (data.success) {
      const sel = document.getElementById("productSelect");
      sel.innerHTML = '<option value="">-- 选择产品 --</option>';
      data.products.forEach(p => {
        sel.innerHTML += '<option value="' + p.id + '">' + p.name + '（' + p.file + '）</option>';
      });
    }
  } catch (err) {
    showToast("加载产品列表失败：" + err.message, "error");
  }
}

// ====== 加载知识库内容 ======
async function loadContent(productId) {
  const area = document.getElementById("contentArea");
  area.value = "加载中...";
  area.disabled = true;
  try {
    const resp = await fetch("/editor/api/load?product=" + encodeURIComponent(productId));
    const data = await resp.json();
    if (data.success) {
      area.value = data.content;
    } else {
      area.value = "";
      showToast(data.error, "error");
    }
  } catch (err) {
    showToast("加载失败：" + err.message, "error");
    area.value = "";
  } finally {
    area.disabled = false;
  }
}

// ====== 保存 ======
async function doSave() {
  if (!currentProduct) { showToast("请先选择产品", "error"); return; }
  const content = document.getElementById("contentArea").value;
  const btn = document.getElementById("saveBtn");
  btn.disabled = true; btn.textContent = "保存中...";

  try {
    const resp = await fetch("/editor/api/save", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({product: currentProduct, content: content}),
    });
    const data = await resp.json();
    if (data.success) {
      showToast(data.message || "保存成功", "success");
    } else {
      showToast(data.error || "保存失败", "error");
    }
  } catch (err) {
    showToast("保存失败：" + err.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "保存";
  }
}

// ====== 退出 ======
async function doLogout() {
  await fetch("/editor/logout", {method: "POST"});
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("editorBox").classList.remove("show");
  document.getElementById("passwordInput").value = "";
  currentProduct = "";
}

// ====== Toast ======
function showToast(msg, type) {
  const existing = document.querySelector(".toast");
  if (existing) existing.remove();
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }, 2000);
}
</script>
</body>
</html>
